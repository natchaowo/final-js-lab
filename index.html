<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Business Web Tools</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌸 Business Web Tools</h1>

<!-- TAX -->
<div class="card">

<h2>Tax Calculator</h2>

<div class="form-row">
<input type="number" id="income" placeholder="Annual Income">
<button onclick="calculateTax()">Calculate</button>
</div>

<p id="taxResult"></p>

</div>


<!-- INVENTORY -->

<div class="card">

<h2>POS Inventory System</h2>

<div class="form-row">
<input type="text" id="productId" placeholder="Product ID">
<input type="number" id="quantity" placeholder="Quantity">
<button onclick="buyProduct()">Buy</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

<p id="totalPrice"></p>

</div>


<!-- CURRENCY -->

<div class="card">

<h2>Currency Converter</h2>

<div class="form-row">
<input type="number" id="usdPrice" placeholder="Price in USD">
<button onclick="convertCurrency()">Convert</button>
</div>

<p id="currencyResult"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
